<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Для символа U+EFC5 всегда предпочитать CaskaydiaCove Nerd Font -->
  <match target="pattern">
    <test name="charset" compare="contains">
      <string>efc5</string>
    </test>
    <!-- Если текущий шрифт не CaskaydiaCove Nerd Font, добавляем его в начало списка -->
    <test name="family" compare="not_eq">
      <string>CaskaydiaCove Nerd Font</string>
    </test>
    <edit name="family" mode="prepend" binding="same">
      <string>CaskaydiaCove Nerd Font</string>
    </edit>
  </match>

  <!-- Также можно поднять приоритет Nerd Font для всех семейств (на всякий случай) -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>CaskaydiaCove Nerd Font</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>CaskaydiaCove Nerd Font</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>CaskaydiaCove Nerd Font</family>
    </prefer>
  </alias>
</fontconfig>
